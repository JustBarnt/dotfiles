# wezterm theme
[colors]
foreground = "#DBD0C6"
background = "#152326"
cursor_bg = "#DBD0C6"
cursor_border = "#DBD0C6"
cursor_fg = "#152326"
selection_bg = "#38524F"
selection_fg = "#DBD0C6"
split = "#86BFD2"
compose_cursor = "#FFCF99"
scrollbar_thumb = "#1E3235"

ansi = ["#152326", "#FF5B61", "#9DC6A9", "#FFCF99", "#86BFD2", "#D59CCE", "#79C2B6", "#91A4AD"]
