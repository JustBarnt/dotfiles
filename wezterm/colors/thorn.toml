[colors.tab_bar.inactive_tab_hover]
fg_color = "#86BFD2"
bg_color = "#1E3235"

[colors.tab_bar.new_tab_hover]
fg_color = "#86BFD2"
bg_color = "#152326"
intensity = "Bold"

[colors.tab_bar.new_tab]
fg_color = "#86BFD2"
bg_color = "#152326"

